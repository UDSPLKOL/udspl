<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GiftHub - Field View</title>
    <style>
        /* Force the body to take up the full mobile screen without scrolling */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        /* Container designed to handle the Google Script iframe height perfectly */
        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
        }

        /* The Frame itself */
        iframe { 
            flex-grow: 1;
            width: 100%; 
            height: 100%; 
            border: none;
            /* Ensures smooth scrolling on iOS */
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbxSef5eRvWz4UQD6UiX5iusFvSkxPr13TsLaR78JtwDX1TtyV070ZtxLyPKWq3rjMB5LQ/exec"
            allow="geolocation; microphone; camera; clipboard-write;"
            loading="eager">
        </iframe>
    </div>

</body>
</html>
