<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0057FF">
  <meta name="description" content="UDS Field Service Application">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="https://i.ibb.co/wfJCVkS/UDS-NEW-LOGO-copy-1-1.png">
  <link rel="apple-touch-icon" href="https://i.ibb.co/wfJCVkS/UDS-NEW-LOGO-copy-1-1.png">
  <title>UDS Field</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    .app-container {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
    }
    iframe {
      flex-grow: 1;
      width: 100%;
      height: 100%;
      border: none;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <iframe 
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycby9o9loNoOMseUvaIzlHsRgFFoPvgvw8lKNgazjyZ8CeGPyL5jokYGsBUGQn8GPWI_3/exec" 
      allow="geolocation">
    </iframe>
  </div>

  <script>
    // --- 1. SERVICE WORKER REGISTRATION (WITH VERSIONING) ---
    if ('serviceWorker' in navigator) {
      // Adding ?v=3 forces the browser to check for a new script immediately
      navigator.serviceWorker.register('sw.js?v=3')
        .then(reg => console.log('SW Registered'))
        .catch(err => console.log('SW Failed:', err));
    }

    // --- 2. ORIGINAL GPS WAKE LOCK ---
    function wakeUpGPS() {
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
          (position) => { console.log("GPS Flowing: ", position.coords.latitude); },
          (error) => { console.log("GPS Waiting: ", error.message); },
          { enableHighAccuracy: true, maximumAge: 0 }
        );
      }
    }
    window.onload = wakeUpGPS;

    // --- 3. BACK BUTTON FIX ---
    // Push a state so the browser has a history entry to "pop"
    window.history.pushState({ active: true }, "", "");

    window.onpopstate = function(event) {
      const frame = document.getElementById('appFrame');
      if (frame) {
        // Try to go back inside the Google Script iframe
        frame.contentWindow.history.back();
        // Re-push the state so the next back button press also stays in-app
        window.history.pushState({ active: true }, "", "");
      }
    };
  </script>
</body>
</html>
