<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0057FF">
  <meta name="description" content="UDS Field Service Application">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="https://i.ibb.co/wfJCVkS/UDS-NEW-LOGO-copy-1-1.png">
  <link rel="apple-touch-icon" href="https://i.ibb.co/wfJCVkS/UDS-NEW-LOGO-copy-1-1.png">
  <title>UDS Field</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    .app-container {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
    }
    iframe {
      flex-grow: 1;
      width: 100%;
      height: 100%;
      border: none;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <iframe 
      src="https://script.google.com/macros/s/AKfycby2QwHU2GFtc5ImVUyvF0jmOCaMQlVnKNG656SPhDeeijUZ89IbiIYNLRSUJxd6duQSTA/exec" 
      allow="geolocation">
    </iframe>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
    }
  </script>
  <script>
  // This function forces the browser to keep the GPS "pipe" open
  function wakeUpGPS() {
    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(
        (position) => {
          console.log("GPS data flowing: ", position.coords.latitude);
        },
        (error) => {
          console.log("GPS Waiting: ", error.message);
        },
        { enableHighAccuracy: true, maximumAge: 0 }
      );
    }
  }

  // Run it as soon as the page loads
  window.onload = wakeUpGPS;
</script>
</body>
</html>
