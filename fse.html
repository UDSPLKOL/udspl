<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0057FF">
  <meta name="description" content="UDS Field Service Application">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="https://i.ibb.co/wfJCVkS/UDS-NEW-LOGO-copy-1-1.png">
  <link rel="apple-touch-icon" href="https://i.ibb.co/wfJCVkS/UDS-NEW-LOGO-copy-1-1.png">
  <title>UDS Field</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    .app-container {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
    }
    iframe {
      flex-grow: 1;
      width: 100%;
      height: 100%;
      border: none;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <iframe 
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycby2QwHU2GFtc5ImVUyvF0jmOCaMQlVnKNG656SPhDeeijUZ89IbiIYNLRSUJxd6duQSTA/exec" 
      allow="geolocation">
    </iframe>
  </div>

  <script>
    // --- SERVICE WORKER REGISTRATION ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
    }

    // --- GPS WAKE LOCK ---
    function wakeUpGPS() {
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
          (position) => { console.log("GPS Active: ", position.coords.latitude); },
          (error) => { console.log("GPS Idle: ", error.message); },
          { enableHighAccuracy: true, maximumAge: 0 }
        );
      }
    }
    window.onload = wakeUpGPS;

    // --- ANDROID BACK BUTTON FIX ---
    // 1. Push a dummy state so there's a "previous page" to go back to
    window.history.pushState({ page: 1 }, "", "");

    window.onpopstate = function(event) {
      const frame = document.getElementById('appFrame');
      if (frame) {
        // 2. Tell the iframe to go back in its own history
        frame.contentWindow.history.back();
        
        // 3. Immediately push the dummy state back so the NEXT back button works too
        window.history.pushState({ page: 1 }, "", "");
      }
    };
  </script>
</body>
</html>
