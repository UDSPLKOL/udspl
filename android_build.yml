name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Use LTS for better stability with Cordova

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create App Wrapper
        run: |
          cordova create myApp com.udspl.portal "UDS Field"
          cd myApp
          cordova platform add android
          
          # Add Geolocation plugin for GPS access
          cordova plugin add cordova-plugin-geolocation
          
          # Force GPS Permissions into the Android System Manifest
          sed -i '/<intent-filter>/i <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" /><uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" /><uses-feature android:name="android.hardware.location.gps" />' platforms/android/app/src/main/AndroidManifest.xml
          
          # This 'Bridge' page handles the Android Hardware Back Button and then redirects
          echo "<html>
          <head>
            <meta name='viewport' content='width=device-width, initial-scale=1.0'>
            <script type='text/javascript' src='cordova.js'></script>
            <script>
              document.addEventListener('deviceready', function() {
                
                // --- THE BACK BUTTON FIX ---
                // This stops the APK from closing when you press back
                document.addEventListener('backbutton', function(e) {
                   e.preventDefault();
                   // Try to go back in the website history
                   window.history.back();
                }, false);

                // --- GPS INITIALIZATION ---
                // Trigger the native prompt, then redirect to your live site
                navigator.geolocation.getCurrentPosition(function() {
                  window.location.href='https://udsplkol.github.io/udsp/fse.html';
                }, function() {
                  // Redirect even if GPS is denied so the app doesn't hang
                  window.location.href='https://udsplkol.github.io/udsp/fse.html';
                }, { enableHighAccuracy: true });
                
              }, false);
            </script>
          </head>
          <body style='background:#0057FF; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:sans-serif;'>
            <div style='text-align:center;'>
              <img src='https://i.ibb.co/wfJCVkS/UDS-NEW-LOGO-copy-1-1.png' style='width:120px; margin-bottom:20px;'>
              <div style='font-size:18px;'>Initializing UDS Field Service...</div>
              <div style='margin-top:10px; opacity:0.7;'>Connecting to Portal</div>
            </div>
          </body>
          </html>" > www/index.html

      - name: Build APK
        run: |
          cd myApp
          # Accept Android SDK Licenses automatically
          yes | sdkmanager --licenses || true
          cordova build android --debug --device

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: uds-field-service-apk
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
