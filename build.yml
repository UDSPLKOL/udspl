name: Build Android APK
on: [push, workflow_dispatch] # Runs on every push or manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create App Wrapper
        run: |
          cordova create myApp com.udspl.portal "UDS Portal"
          cd myApp
          cordova platform add android
          
          # Replace the default index with your redirect
          echo '<script>window.location.href="https://udsplkol.github.io/udspl/fse.html";</script>' > www/index.html
          
          # Add GPS Plugin
          cordova plugin add cordova-plugin-geolocation

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          cd myApp
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: uds-portal-apk
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
